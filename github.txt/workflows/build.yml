name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    name: Build on Windows
    runs-on: windows-2019

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify .NET Framework
        run: |
          Get-ChildItem "C:\Program Files (x86)\Reference Assemblies\Microsoft\Framework\.NETFramework" -Directory | Select-Object -ExpandProperty Name
        shell: powershell

      - name: Verify Roslyn Compiler
        run: |
          Get-ChildItem ".\lib\roslyn\csc.exe" | Select-Object FullName, Length
        shell: powershell

      - name: Verify Runtime DLLs
        run: |
          Get-ChildItem ".\lib\managed\*.dll" | Select-Object Name, Length
          Get-ChildItem ".\lib\native\*.dll" | Select-Object Name, Length
        shell: powershell

      - name: Build WinForms Application
        run: cmd /c "build_app.bat"
        shell: cmd

      - name: Run E2E Tests
        run: cmd /c "build_e2e.bat"
        shell: cmd
        continue-on-error: true

      - name: Collect Build Artifacts
        run: |
          if (!(Test-Path "release")) { New-Item -ItemType Directory -Path "release" -Force | Out-Null }
          Copy-Item "bin\Perilla.Mechanical.App.exe" -Destination "release\" -Force
          Copy-Item "bin\PdfiumViewer.dll" -Destination "release\" -Force
          Copy-Item "bin\EPPlus.dll" -Destination "release\" -Force
          if (Test-Path "bin\pdfium.dll") { Copy-Item "bin\pdfium.dll" -Destination "release\" -Force }
          Write-Host "Release files:"
          Get-ChildItem "release\" | Select-Object Name, Length
        shell: powershell

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Perilla-Mechanical-PDF-Editor
          path: release/

      - name: Create Release ZIP
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          Compress-Archive -Path "release\*" -DestinationPath "Perilla-Mechanical-PDF-Editor-${{ github.ref_name }}.zip" -Force
        shell: powershell

      - name: Upload Release ZIP
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: Perilla-Mechanical-PDF-Editor-ZIP
          path: "Perilla-Mechanical-PDF-Editor-${{ github.ref_name }}.zip"

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: Perilla-Mechanical-PDF-Editor-ZIP
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/*.zip